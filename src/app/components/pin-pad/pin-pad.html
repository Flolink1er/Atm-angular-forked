<div class="pin-pad-wrapper">
  <div class="title">
    <h3>
      Entrez votre code pin
    </h3>
  </div>

  <div class="pin-container">
    <div class="password">
      <p>{{pin}}</p>
    </div>
  </div>
  <mat-grid-list cols="3" rowHeight="1:1">
    @for (car of tiles; track car) {
    <mat-grid-tile>
      <button mat-raised-button (click)="handleClick(car)">{{ car }}</button>
    </mat-grid-tile>
    }
  </mat-grid-list>
</div>
